name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout content
        uses: actions/checkout@v4
        with:
          path: content-repo

      - name: Checkout builder
        uses: actions/checkout@v4
        with:
          repository: Mazek27/mazcode-web-builder
          path: builder
          token: ${{ secrets.BUILDER_ACCESS_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: builder/package-lock.json

      - name: Install dependencies
        run: cd builder && npm ci

      - name: Copy content into builder
        run: |
          rm -rf builder/content
          if [ -d content-repo/content ]; then
            cp -r content-repo/content builder/content
          else
            cp -r content-repo builder/content
          fi

      - name: Strip non-static routes for export
        run: |
          rm -rf builder/src/app/'(admin)'
          rm -rf builder/src/app/'(admin-public)'
          rm -rf builder/src/app/api
          rm -rf builder/src/app/actions
          rm -f builder/src/proxy.ts
          rm -rf builder/src/app/'(fullscreen)'
          rm -f builder/src/app/robots.ts
          rm -f builder/src/app/sitemap.ts

      - name: Determine site URL and base path
        id: site-url
        run: |
          DOMAIN="${{ vars.SITE_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            echo "url=https://$DOMAIN" >> $GITHUB_OUTPUT
            echo "basepath=" >> $GITHUB_OUTPUT
          else
            echo "url=https://MazCom-Websites.github.io/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
            echo "basepath=/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build static site
        run: cd builder && npx next build
        env:
          STATIC_EXPORT: '1'
          PAGES_BASE_PATH: ${{ steps.site-url.outputs.basepath }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.site-url.outputs.url }}
          NEXT_PUBLIC_FORM_API_URL: ${{ vars.FORM_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builder/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
